{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'en' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "Server Error - 500" %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

    <div class="flex flex-col items-center justify-center min-h-[60vh] text-center px-4 font-black h-max">
        <div class="text-9xl font-black select-none bg-red-600 rounded-xl p-4 text-white shadow-xl">
            500
        </div>
        <h1 class="text-3xl text-black font-bold mb-4 mt-8">
            {% trans "Critical System Error" %}
        </h1>
        <p class="text-slate-900 mb-8 max-w-md font-black text-lg">
            {% trans "Our servers encountered an unexpected problem. Our best engineers (well, it's just me but still..😅) are on it." %}
        </p>
        <a href="/" class="px-6 py-3 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-xl transition-all font-black shadow-lg flex items-center">
            <i class="fa-solid fa-rotate-right mr-2"></i> {% trans "Retry / Home" %}
        </a>
    </div>

</body>
</html>
